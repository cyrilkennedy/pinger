<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Service Status — Live Health Monitor</title>
    <meta name="description" content="Real-time uptime and health monitoring dashboard for all services. See what's up, slow, or down at a glance.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <!-- Animated gradient orbs -->
    <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
    <div class="bg-orb bg-orb--3" aria-hidden="true"></div>

    <main class="shell">
      <header class="topbar" id="topbar">
        <div class="topbar-left">
          <div class="logo">
            <div class="logo-icon" aria-hidden="true">
              <span class="pulse-ring"></span>
              <span class="pulse-dot"></span>
            </div>
            <span class="logo-text">Pinger</span>
          </div>
          <h1>Service Status</h1>
          <p class="subtitle">Real-time health monitoring across all services</p>
        </div>
        <div class="topbar-right">
          <div class="summary-card" aria-live="polite">
            <div class="summary-row">
              <span class="summary-label">Status</span>
              <span class="summary-value" id="summaryText">Initializing…</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Last check</span>
              <span class="summary-value summary-value--muted" id="lastChecked">—</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Next refresh</span>
              <span class="summary-value summary-value--muted" id="nextRefresh">60s</span>
            </div>
          </div>
          <div class="summary-badges" id="summaryBadges" aria-live="polite"></div>
        </div>
      </header>

      <div class="progress-bar" id="progressBar" aria-hidden="true">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>

      <section id="statusGroups" class="groups" aria-live="polite">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Checking services…</p>
        </div>
      </section>

      <footer class="footer">
        <p>Auto-refreshes every 60 seconds · <span id="serviceCount">0</span> services monitored</p>
      </footer>
    </main>

    <script src="/services.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
